# Render Blueprint for Nova: a static client site + a Node web-service server.
#
# Render reads render.yaml from the REPOSITORY ROOT. Since Nova lives in the
# nova-avatar/ subfolder, either:
#   (a) copy this file to the repo root (it already sets rootDir: nova-avatar), or
#   (b) create the two services by hand in the Render dashboard using the
#       settings below.
# See docs/DEPLOY.md for the full walkthrough and how to wire CLIENT_ORIGIN /
# VITE_API_BASE so the deployed client can talk to the deployed server.

services:
  # ---- API server ----
  - type: web
    name: nova-server
    runtime: node
    rootDir: nova-avatar
    plan: free
    buildCommand: npm install && npm run build:server
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_MAX_TOKENS
        value: '1024'
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_turbo_v2_5
      # Set to the nova-client static-site URL once it exists.
      - key: CLIENT_ORIGIN
        sync: false

  # ---- Static client ----
  - type: web
    name: nova-client
    runtime: static
    rootDir: nova-avatar
    buildCommand: npm install && npm run build:client
    staticPublishPath: client/dist
    autoDeploy: true
    envVars:
      # Set to the nova-server URL, e.g. https://nova-server.onrender.com
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
